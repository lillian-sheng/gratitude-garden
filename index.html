<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Garden ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Spectral:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    /* Shared */
    --panel:      #f4f0e8;
    --panel-mid:  #e8e4d8;
    --panel-rule: #c8c0a8;
    --ink:        #1a1810;
    --ink-soft:   #706850;
    --gold:       #b89050;
    --gold-dark:  #8a6830;
    --entry-font: 'Spectral', serif;
    --head-font:  'Cormorant Garamond', serif;

    /* Sky/hill gradient stops — overridden per mode */
    --sky-0: #c8c2b4; --sky-1: #d8d0c0; --sky-2: #c0b8a8;
    --hill-far-0: #8a9272; --hill-far-1: #6a7252;
    --hill-mid-0: #78845e; --hill-mid-1: #586440;
    --hill-near-0: #687458; --hill-near-1: #485438;

    /* UI chrome — overridden per mode */
    --header-bg:      rgba(232,227,214,0.72);
    --header-border:  rgba(196,184,154,0.45);
    --header-text:    #1a1810;
    --chrome-border:  rgba(196,184,154,0.6);
    --chrome-text:    #706850;
    --nudge-border:   rgba(196,184,154,0.6);
    --nudge-text:     rgba(255,255,255,0.9);
  }

  body.night-mode {
    --sky-0: #0c1018; --sky-1: #1a1e28; --sky-2: #2a2e22;
    --hill-far-0: #2a3420; --hill-far-1: #1e2818;
    --hill-mid-0: #222e18; --hill-mid-1: #182210;
    --hill-near-0: #1e2a14; --hill-near-1: #141c0c;

    --header-bg:     rgba(14,16,8,0.55);
    --header-border: rgba(184,144,80,0.2);
    --header-text:   rgba(244,240,232,0.85);
    --chrome-border: rgba(184,144,80,0.4);
    --chrome-text:   rgba(244,240,232,0.6);
    --nudge-border:  rgba(184,144,80,0.35);
    --nudge-text:    rgba(244,240,232,0.75);
  }

  /* Show/hide atmosphere elements */
  .day-elements  { display: block; }
  .night-elements { display: none; }
  body.night-mode .day-elements  { display: none; }
  body.night-mode .night-elements { display: block; }

  /* Tree and grass tones per mode */
  .tree-canopy { fill: #3c6830; }
  .tree-canopy-dark { fill: #4a7a38; }
  .tree-trunk  { stroke: #7a5840; }
  .tree-branch { stroke: #7a5535; }
  .grass-a { stroke: #4a5a38; }
  .grass-b { stroke: #5a6848; }
  .grass-c { stroke: #6a7858; }
  body.night-mode .tree-canopy      { fill: #162010; }
  body.night-mode .tree-canopy-dark { fill: #0e1a0a; }
  body.night-mode .tree-trunk  { stroke: #2a1e14; }
  body.night-mode .tree-branch { stroke: #241a10; }
  body.night-mode .grass-a { stroke: #283018; }
  body.night-mode .grass-b { stroke: #324020; }
  body.night-mode .grass-c { stroke: #3c4e28; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #0e1018;
  }

  /* ─── Garden scene ─── */
  .garden-scene {
    position: fixed;
    inset: 0;
  }

  .garden-svg {
    width: 100%;
    height: 100%;
  }

  /* ─── Keyframes ─── */
  @keyframes sway {
    0%,100% { transform: rotate(-2.5deg); }
    50%      { transform: rotate(2.5deg);  }
  }
  @keyframes sway-slow {
    0%,100% { transform: rotate(-1.5deg); }
    50%      { transform: rotate(1.8deg);  }
  }
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 360px)); }
  }
  @keyframes fly {
    0%   { transform: translate(-120px, 0px); }
    30%  { transform: translate(30vw,  -18px); }
    60%  { transform: translate(60vw,   8px);  }
    100% { transform: translate(calc(100vw + 120px), -5px); }
  }
  @keyframes flutter {
    0%,100% { transform: scaleX(1)   translateY(0px);  }
    25%      { transform: scaleX(0.5) translateY(-4px); }
    50%      { transform: scaleX(1)   translateY(-7px); }
    75%      { transform: scaleX(0.5) translateY(-3px); }
  }
  @keyframes float-path {
    0%   { transform: translate(0px,  0px);  }
    25%  { transform: translate(22px, -14px);}
    50%  { transform: translate(44px,  0px);  }
    75%  { transform: translate(22px,  12px);}
    100% { transform: translate(0px,  0px);  }
  }
  @keyframes panel-slide-up {
    from { transform: translateX(-50%) translateY(100%); }
    to   { transform: translateX(-50%) translateY(0); }
  }
  @keyframes bud-pop {
    0%   { transform: scale(0) translateY(12px); opacity: 0; }
    65%  { transform: scale(1.25) translateY(-4px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  @keyframes bloom-in {
    0%   { transform: scale(0.1) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.6; transform: scale(0.88); }
  }

  /* ─── Grass & flower sway ─── */
  .grass { transform-origin: bottom center; animation: sway 3s ease-in-out infinite; }
  .grass:nth-child(2n)   { animation-delay: -1.1s; animation-duration: 2.7s; }
  .grass:nth-child(3n)   { animation-delay: -2.0s; animation-duration: 3.5s; }
  .grass:nth-child(5n)   { animation-delay: -0.4s; animation-duration: 2.4s; }
  .flower-grp { pointer-events: bounding-box; }
  .flower-sway {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: sway-slow 5s ease-in-out infinite;
    pointer-events: bounding-box;
  }

  /* ─── Clouds ─── */
  .cloud-a { animation: drift 55s linear infinite; }
  .cloud-b { animation: drift 70s linear infinite; animation-delay: -28s; }
  .cloud-c { animation: drift 48s linear infinite; animation-delay: -18s; }

  /* ─── Birds ─── */
  .bird-a { animation: fly 32s linear infinite; }
  .bird-b { animation: fly 44s linear infinite; animation-delay: -17s; }

  /* ─── Butterflies ─── */
  .bfly-path-a { animation: float-path 9s  ease-in-out infinite; }
  .bfly-path-b { animation: float-path 11s ease-in-out infinite; animation-delay: -5s; }
  .bfly-wings  { animation: flutter 0.75s ease-in-out infinite; transform-origin: center; }
  .bfly-wings-b{ animation: flutter 0.85s ease-in-out infinite; animation-delay: -0.3s; transform-origin: center; }

  /* ─── UI layer ─── */
  .ui { position: fixed; inset: 0; pointer-events: none; }
  .ui > * { pointer-events: all; }

  /* ─── Header bar ─── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 14px 24px;
    backdrop-filter: blur(16px);
    transition: background 1.2s ease, border-color 1.2s ease;
  }

  .header-date {
    font-family: var(--head-font);
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: var(--header-text);
    letter-spacing: 0.04em;
    transition: color 1.2s ease;
  }

  /* ─── Archive button ─── */
  .archive-btn {
    position: fixed;
    top: 10px;
    right: 20px;
    background: none;
    border: 1px solid var(--chrome-border);
    border-radius: 2px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--chrome-text);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .archive-btn:hover { opacity: 0.75; }

  /* ─── Journal toggle (notebook icon) ─── */
  .journal-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 68px;
    height: 68px;
    background: none;
    border: none;
    cursor: pointer;
    filter: drop-shadow(2px 4px 6px rgba(58,40,24,0.28));
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .journal-btn:hover { transform: scale(1.12) rotate(-4deg); }

  /* ─── "Write today's entry" nudge ─── */
  .nudge {
    position: fixed;
    bottom: 40px;
    right: 108px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--nudge-border);
    padding: 4px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--nudge-text);
    pointer-events: none;
    animation: pulse-dot 2.8s ease-in-out infinite;
  }
  .nudge::after { display: none; }

  /* ─── Journal panel ─── */
  .journal-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: min(540px, 94vw);
    background: var(--panel);
    border-radius: 2px 2px 0 0;
    border: none;
    border-top: 1px solid rgba(184,144,80,0.3);
    padding: 10px 30px 34px;
    box-shadow: 0 -8px 48px rgba(0,0,0,0.5);
    transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 60;
  }
  .journal-panel.open {
    transform: translateX(-50%) translateY(0);
  }

  .journal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: 1px solid var(--panel-rule);
    border-radius: 2px;
    width: 28px;
    height: 28px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .journal-close:hover { background: var(--panel-mid); color: var(--ink); }

  .drag-handle {
    width: 36px;
    height: 1px;
    background: var(--panel-rule);
    border-radius: 1px;
    margin: 16px auto 20px;
  }

  .panel-title {
    font-family: var(--head-font);
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    text-align: center;
    margin-bottom: 2px;
    letter-spacing: 0.01em;
  }
  .panel-sub {
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  .fields {
    display: flex;
    flex-direction: column;
    gap: 11px;
    margin-bottom: 16px;
  }

  .field-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
    padding-left: 2px;
  }

  .field-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .field-icon {
    font-size: 16px;
    margin-top: 10px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .field-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--panel-rule);
    border-radius: 0;
    padding: 8px 2px;
    font-family: var(--entry-font);
    font-size: 17px;
    color: var(--ink);
    outline: none;
    resize: none;
    min-height: 40px;
    overflow: hidden;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  .field-input:focus {
    border-bottom-color: var(--gold);
    box-shadow: none;
  }
  .field-input::placeholder { color: var(--panel-rule); opacity: 1; }

  .reflection-wrap {
    border-top: 1px solid var(--panel-rule);
    padding-top: 14px;
    margin-top: 8px;
  }
  .reflection-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    padding-left: 2px;
  }
  .reflection-label span { font-size: 10px; color: var(--panel-rule); text-transform: none; letter-spacing: 0; }
  .reflection-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--panel-rule);
    border-radius: 0;
    padding: 8px 2px;
    font-family: var(--entry-font);
    font-size: 16px;
    color: var(--ink);
    outline: none;
    resize: none;
    min-height: 60px;
    transition: border-color 0.2s;
  }
  .reflection-input:focus {
    border-bottom-color: var(--gold);
    box-shadow: none;
  }
  .reflection-input::placeholder { color: var(--panel-rule); opacity: 1; }

  .plant-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 11px 0;
    background: transparent;
    color: var(--gold-dark);
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: none;
    transition: background 0.2s, color 0.2s;
  }
  .plant-btn:hover  { background: var(--gold); color: var(--panel); }
  .plant-btn:active { opacity: 0.8; }

  /* ─── Archive panel ─── */
  .archive-panel {
    position: fixed;
    top: 0; right: 0;
    width: min(370px, 94vw);
    height: 100vh;
    background: var(--panel);
    border-left: 1px solid rgba(184,144,80,0.25);
    transform: translateX(100%);
    transition: transform 0.34s cubic-bezier(0.4,0,0.2,1);
    z-index: 80;
    box-shadow: -4px 0 24px rgba(30,26,20,0.10);
    overflow-y: auto;
    padding: 28px 22px 60px;
  }
  .archive-panel.open { transform: translateX(0); }

  .archive-close {
    position: absolute;
    top: 18px; right: 18px;
    background: none;
    border: 1px solid var(--panel-rule);
    border-radius: 2px;
    width: 28px; height: 28px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .archive-close:hover { background: var(--panel-mid); }

  .archive-head { font-family: var(--head-font); font-size: 26px; font-weight: 300; font-style: italic; color: var(--ink); margin-bottom: 2px; letter-spacing: 0.01em; }
  .archive-sub  { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 22px; }

  .archive-entry {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--panel-rule);
    border-radius: 0;
    padding: 14px 0;
    margin-bottom: 0;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .archive-entry:hover { opacity: 0.6; }

  .entry-date  { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 6px; }
  .entry-item  { font-family: var(--entry-font); font-size: 13px; font-weight: 400; color: var(--ink); line-height: 1.6; padding-left: 2px; }
  .entry-item::before { content: '— '; color: var(--panel-rule); }

  /* ─── Tooltip ─── */
  .tooltip {
    position: fixed;
    background: rgba(14,16,8,0.9);
    border: 1px solid rgba(184,144,80,0.3);
    border-radius: 2px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: rgba(244,240,232,0.88);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    z-index: 200;
    max-width: 240px;
    box-shadow: none;
    white-space: nowrap;
  }
  .tooltip.show { opacity: 1; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(14,16,8,0.92);
    color: rgba(244,240,232,0.88);
    border: 1px solid rgba(184,144,80,0.3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 8px 22px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 300;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Entry detail modal ─── */
  .entry-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(42, 28, 14, 0.5);
    backdrop-filter: blur(4px);
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .entry-modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .entry-modal {
    background: var(--panel);
    border: 1px solid rgba(184,144,80,0.25);
    border-radius: 3px;
    padding: 44px 48px 40px;
    width: min(560px, 90vw);
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 16px 48px rgba(30,26,20,0.18);
    transform: scale(0.92) translateY(16px);
    transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
  }
  .entry-modal-backdrop.open .entry-modal {
    transform: scale(1) translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: 1px solid var(--parchment-dark);
    border-radius: 2px;
    width: 28px;
    height: 28px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--parchment-mid); }

  .modal-weekday {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .modal-date {
    font-family: var(--head-font);
    font-size: 36px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .modal-divider {
    text-align: center;
    color: var(--parchment-dark);
    font-size: 14px;
    letter-spacing: 6px;
    margin-bottom: 24px;
    border-top: 1px solid var(--parchment-dark);
    padding-top: 20px;
  }
  .modal-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }
  .modal-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .modal-item-num {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold-dark);
    background: transparent;
    border: 1px solid rgba(184,144,80,0.35);
    border-radius: 2px;
    padding: 3px 7px;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .modal-item-text {
    font-family: var(--entry-font);
    font-weight: 400;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.4;
  }
  .modal-reflection-wrap {
    border-top: 1px solid var(--parchment-dark);
    padding-top: 18px;
    margin-top: 4px;
  }
  .modal-reflection-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .modal-reflection-text {
    font-family: var(--entry-font);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }
  .modal-flowers-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--parchment-dark);
    justify-content: center;
  }
  .modal-flower-pip {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     GARDEN SVG
════════════════════════════════════════ -->
<div class="garden-scene">
<svg class="garden-svg" viewBox="0 0 1440 810" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Gradients -->

    <stop offset="0%"   style="stop-color: var(--sky-0)"/>
    <stop offset="45%"  style="stop-color: var(--sky-1)"/>
    <stop offset="100%" style="stop-color: var(--sky-2)"/>

  <linearGradient id="gHillFar" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   style="stop-color: var(--hill-far-0)"/>
    <stop offset="100%" style="stop-color: var(--hill-far-1)"/>

  <linearGradient id="gHillMid" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   style="stop-color: var(--hill-mid-0)"/>
    <stop offset="100%" style="stop-color: var(--hill-mid-1)"/>

  <linearGradient id="gHillNear" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   style="stop-color: var(--hill-near-0)"/>
    <stop offset="100%" style="stop-color: var(--hill-near-1)"/>
  </linearGradient>
  <linearGradient id="gTrunk" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#5a4030"/>
    <stop offset="100%" stop-color="#7a5840"/>
  </linearGradient>
  <!-- Handdrawn wobble filter -->
  <filter id="hd" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.04 0.035" numOctaves="3" seed="5" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="hd2" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.06 0.05" numOctaves="2" seed="12" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- Subtle paper texture -->
  <filter id="paper">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
    <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
</defs>

<script>
  /* ── Live date ── */
  (function() {
    const now = new Date();
    const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const day = now.getDate();
    const suffix = (d => d >= 11 && d <= 13 ? 'th' : ['th','st','nd','rd'][d % 10] || 'th')(day);
    const label = `${weekdays[now.getDay()]}, ${months[now.getMonth()]} ${day}${suffix}`;
    document.getElementById('headerDate').textContent = label;
    document.getElementById('panelDate').textContent = label;
  })();

  /* ── Entry data store ── */
  const entryData = {};

  /* ── Panel toggles ── */
  function toggleJournal() {
    document.getElementById('journalPanel').classList.toggle('open');
  }
  function toggleArchive() {
    document.getElementById('archivePanel').classList.toggle('open');
  }

  /* ── Entry modal ── */
  function openEntryModal(key) {
    const data = entryData[key];
    if (!data) return;

    document.getElementById('modalWeekday').textContent = data.weekday;
    document.getElementById('modalDate').textContent = data.date;

    const itemsEl = document.getElementById('modalItems');
    itemsEl.innerHTML = data.items.map((item, i) => `
      <div class="modal-item">
        <span class="modal-item-num">${['one','two','three'][i]}</span>
        <span class="modal-item-text">${item}</span>
      </div>`).join('');

    const reflWrap = document.getElementById('modalReflectionWrap');
    const reflEl   = document.getElementById('modalReflection');
    if (data.reflection) {
      reflEl.textContent = data.reflection;
      reflWrap.style.display = '';
    } else {
      reflWrap.style.display = 'none';
    }

    const flowersEl = document.getElementById('modalFlowers');
    const budLabel  = data.items.length < 3 ? ' <span style="font-family:\'DM Sans\',sans-serif;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-soft);margin-left:6px;">partial bloom</span>' : '';
    if (data.flowers && data.flowers.length) {
      flowersEl.innerHTML = data.flowers.map(f => `<div class="modal-flower-pip">${f}</div>`).join('') + budLabel;
      flowersEl.style.display = '';
    } else {
      flowersEl.innerHTML = budLabel;
      flowersEl.style.display = budLabel ? '' : 'none';
    }

    document.getElementById('entryModal').classList.add('open');
  }

  function closeEntryModal() {
    document.getElementById('entryModal').classList.remove('open');
  }

  function closeEntryModalBackdrop(e) {
    if (e.target === document.getElementById('entryModal')) closeEntryModal();
  }

     <ellipse cx="0" cy="-52" rx="6.5" ry="13" fill="#f0d840" transform="rotate(144,0,-40)"/>
     <ellipse cx="0" cy="-52" rx="6.5" ry="13" fill="#e8cc30" transform="rotate(216,0,-40)"/>
     <ellipse cx="0" cy="-52" rx="6.5" ry="13" fill="#f0d840" transform="rotate(288,0,-40)"/>
     <circle cx="0" cy="-40" r="9" fill="#c07818"/>
     <circle cx="0" cy="-40" r="4.5" fill="#9a5808"/>`,
    // coral
    `<path d="M0 0 Q-1 -15 0 -44" stroke="#4a7c3f" stroke-width="3.4" fill="none" stroke-linecap="round"/>
     <path d="M0 -26 Q12 -32 16 -23 Q10 -17 0 -26" fill="#5a9048"/>
     <ellipse cx="0" cy="-56" rx="6.5" ry="13" fill="#f09890" transform="rotate(0,0,-44)"/>
     <ellipse cx="0" cy="-56" rx="6.5" ry="13" fill="#e88878" transform="rotate(72,0,-44)"/>
     <ellipse cx="0" cy="-56" rx="6.5" ry="13" fill="#f09890" transform="rotate(144,0,-44)"/>
     <ellipse cx="0" cy="-56" rx="6.5" ry="13" fill="#e88878" transform="rotate(216,0,-44)"/>
     <ellipse cx="0" cy="-56" rx="6.5" ry="13" fill="#f09890" transform="rotate(288,0,-44)"/>
     <circle cx="0" cy="-44" r="9.5" fill="#f0c030"/>
     <circle cx="0" cy="-44" r="4.5" fill="#c89010"/>`,
  ];

  let nextFlowerType = 0;
  // {x,y} pairs scattered naturally across the hillside, avoiding tree/buds/mushroom
  const newFlowerSlots = [
    {x:  68, y: 622}, {x: 152, y: 610}, {x: 244, y: 630}, {x: 318, y: 616},
    {x: 464, y: 626}, {x: 552, y: 598}, {x: 800, y: 632}, {x: 862, y: 612},
    {x: 928, y: 624}, {x: 998, y: 596}, {x:1060, y: 630}, {x:1130, y: 608},
    {x:1208, y: 622}, {x:1292, y: 600}, {x:1372, y: 626},
  ];
  let nextSlot = 0;

  function attachTip(el, tipText) {
    // handled by SVG event delegation
  }

  const flowerDefs = [
    // ivory daisy
    { petalColor: ['#e8e0c8','#d8d0b8'], petalCount: 8, centerFill: '#c8a050', centerInner: '#a07828', stemPath: 'M0 0 Q2 -18 1 -46', petalCx: 1, petalCy: -58, petalRx: 7, petalRy: 14, petalRef: [1,-46], centerCy: -46, centerR: 10 },
    // pale gold 6-petal
    { petalColor: ['#d4b870','#c8a858'], petalCount: 6, centerFill: '#8a6030', centerInner: '#6a4820', stemPath: 'M0 0 Q1 -16 0 -44', petalCx: 0, petalCy: -56, petalRx: 6.5, petalRy: 13, petalRef: [0,-44], centerCy: -44, centerR: 9.5 },
    // blush 5-petal
    { petalColor: ['#d8c0b0','#c8b0a0'], petalCount: 5, centerFill: '#b89050', centerInner: '#907030', stemPath: 'M0 0 Q-1 -14 0 -40', petalCx: 0, petalCy: -52, petalRx: 6.5, petalRy: 13, petalRef: [0,-40], centerCy: -40, centerR: 9 },
    // pale sage 5-petal
    { petalColor: ['#c8ceb0','#b8be98'], petalCount: 5, centerFill: '#c8a050', centerInner: '#a07828', stemPath: 'M0 0 Q-1 -15 0 -44', petalCx: 0, petalCy: -56, petalRx: 6.5, petalRy: 13, petalRef: [0,-44], centerCy: -44, centerR: 9.5 },
  ];

  function makeFlowerEl(def) {
    const ns = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(ns, 'g');

    const stem = document.createElementNS(ns, 'path');
    stem.setAttribute('d', def.stemPath);
    stem.setAttribute('stroke', '#3a4828');
    stem.setAttribute('stroke-width', '3.6');
    stem.setAttribute('fill', 'none');
    stem.setAttribute('stroke-linecap', 'round');
    g.appendChild(stem);

    const step = 360 / def.petalCount;
    for (let i = 0; i < def.petalCount; i++) {
      const petal = document.createElementNS(ns, 'ellipse');
      petal.setAttribute('cx', String(def.petalCx));
      petal.setAttribute('cy', String(def.petalCy));
      petal.setAttribute('rx', String(def.petalRx));
      petal.setAttribute('ry', String(def.petalRy));
      petal.setAttribute('fill', def.petalColor[i % def.petalColor.length]);
      petal.setAttribute('transform', `rotate(${i * step},${def.petalRef[0]},${def.petalRef[1]})`);
      g.appendChild(petal);
    }

    const center = document.createElementNS(ns, 'circle');
    center.setAttribute('cx', String(def.petalCx));
    center.setAttribute('cy', String(def.centerCy));
    center.setAttribute('r', String(def.centerR));
    center.setAttribute('fill', def.centerFill);
    g.appendChild(center);

    const inner = document.createElementNS(ns, 'circle');
    inner.setAttribute('cx', String(def.petalCx));
    inner.setAttribute('cy', String(def.centerCy));
    inner.setAttribute('r', String(def.centerR * 0.48));
    inner.setAttribute('fill', def.centerInner);
    g.appendChild(inner);

    return g;
  }

  function addFlowerToSVG(tipText) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.querySelector('.garden-svg');
    const def  = flowerDefs[nextFlowerType++ % flowerDefs.length];
    const slot = newFlowerSlots[nextSlot % newFlowerSlots.length];
    const x    = slot.x + Math.round((Math.random() - 0.5) * 28);
    const y    = slot.y + Math.round((Math.random() - 0.5) * 14);
    nextSlot++;

    // Outer: position only (no CSS class — prevents animation from overriding translate)
    const outer = document.createElementNS(ns, 'g');
    outer.setAttribute('transform', `translate(${x},${y})`);
    outer.setAttribute('data-tip', tipText);
    outer.style.cursor = 'pointer';

    // Middle: scale only
    const scale = document.createElementNS(ns, 'g');
    scale.setAttribute('transform', 'scale(0.62)');

    // Inner: sway animation (CSS rotation around base of stem)
    const sway = document.createElementNS(ns, 'g');
    sway.setAttribute('class', 'flower-sway');
    sway.style.animationDelay = `${-(Math.random() * 5).toFixed(2)}s`;
    sway.appendChild(makeFlowerEl(def));

    scale.appendChild(sway);
    outer.appendChild(scale);
    svg.appendChild(outer);
  }


  /* ── Entry persistence ── */
  function loadEntries() {
    try {
      const raw = localStorage.getItem('gratitude_entries');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  }

  function saveEntry(items, reflection) {
    const now = new Date();
    const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const day = now.getDate();
    const suffix = (d => d >= 11 && d <= 13 ? 'th' : ['th','st','nd','rd'][d % 10] || 'th')(day);
    const key = now.toISOString().split('T')[0]; // e.g. '2026-03-18'
    const entry = {
      key,
      weekday: weekdays[now.getDay()],
      date: `${months[now.getMonth()]} ${day}${suffix}, ${now.getFullYear()}`,
      items,
      reflection: reflection || null
    };
    const entries = loadEntries();
    entries[key] = entry;
    try { localStorage.setItem('gratitude_entries', JSON.stringify(entries)); } catch(e) {}
    entryData[key] = entry;
  }

  function renderArchive() {
    const entries = loadEntries();
    const container = document.getElementById('archiveEntries');
    const keys = Object.keys(entries).sort().reverse(); // newest first
    if (!keys.length) {
      container.innerHTML = '<div style="font-family:\'DM Sans\',sans-serif;font-size:12px;color:var(--ink-soft);padding:16px 0;opacity:0.6;letter-spacing:0.04em;">No entries yet.</div>';
      return;
    }
    container.innerHTML = keys.map(key => {
      const e = entries[key];
      return `<div class="archive-entry" onclick="openEntryModal('${key}')">
        <div class="entry-date">${e.weekday}, ${e.date}</div>
        ${e.items.map(item => `<div class="entry-item">${item}</div>`).join('')}
      </div>`;
    }).join('');
  }

  function populateGardenFromHistory() {
    const entries = loadEntries();
    Object.keys(entries).sort().forEach(key => {
      entryData[key] = entries[key];
      entries[key].items.forEach(item => addFlowerToSVG(item));
    });
  }

  /* ── Submit — plants flowers ── */
  function submitEntry() {
    const fields = [...document.querySelectorAll('.field-input')];
    const filled = fields.filter(f => f.value.trim());

    if (!filled.length) {
      showToast('write something first');
      fields[0].focus();
      return;
    }

    document.getElementById('journalPanel').classList.remove('open');

    const tips = filled.map(f => f.value.trim());
    const reflection = document.querySelector('.reflection-input').value.trim();
    saveEntry(tips, reflection || null);
    renderArchive();
    saveDraft();

    tips.forEach((tip, i) => {
      setTimeout(() => addFlowerToSVG(tip), i * 450);
    });

    showToast(`${tips.length} of 3 planted`);

    const btn = document.getElementById('plantBtn');
    btn.textContent = 'Planted';
    btn.style.background = 'var(--gold)';
    btn.style.color = 'var(--panel)';
    setTimeout(() => {
      btn.textContent = 'Plant it';
      btn.style.background = '';
      btn.style.color = '';
    }, tips.length * 450 + 1500);
  }

  document.getElementById('plantBtn').addEventListener('click', submitEntry);

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  /* ── Highlight day (demo) ── */
  function highlightDay() {
    document.querySelectorAll('.flower-grp').forEach((f, i) => {
      setTimeout(() => {
        f.style.filter = 'drop-shadow(0 0 10px rgba(244,192,48,0.95))';
        f.style.transition = 'filter 0.2s';
        setTimeout(() => { f.style.filter = ''; }, 900);
      }, i * 130);
    });
  }

  /* ── Flower tooltips ── */
  const tooltip = document.getElementById('tooltip');
  document.addEventListener('mousemove', e => {
    const el = e.target.closest('[data-tip]');
    if (el) {
      tooltip.textContent = el.dataset.tip;
      tooltip.classList.add('show');
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top  = (e.clientY - 42) + 'px';
    } else {
      tooltip.classList.remove('show');
    }
  });

  /* ── Escape key closes all panels ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeEntryModal();
      document.getElementById('journalPanel').classList.remove('open');
      document.getElementById('archivePanel').classList.remove('open');
    }
    if (e.key === 'j' && !e.target.matches('textarea,input')) toggleJournal();
  });

  /* ── Draft persistence ── */
  function saveDraft() {
    try {
      const fields = [...document.querySelectorAll('.field-input')].map(f => f.value);
      const reflection = document.querySelector('.reflection-input').value;
      localStorage.setItem('gratitude_draft', JSON.stringify({
        date: new Date().toDateString(), fields, reflection
      }));
    } catch(e) {}
  }

  function restoreDraft() {
    try {
      const raw = localStorage.getItem('gratitude_draft');
      if (!raw) return;
      const draft = JSON.parse(raw);
      if (draft.date !== new Date().toDateString()) {
        localStorage.removeItem('gratitude_draft');
        return;
      }
      const fieldEls = [...document.querySelectorAll('.field-input')];
      (draft.fields || []).forEach((val, i) => {
        if (fieldEls[i] && val != null) fieldEls[i].value = val;
      });
      const refl = document.querySelector('.reflection-input');
      if (refl && draft.reflection) refl.value = draft.reflection;
      document.querySelectorAll('.field-input, .reflection-input').forEach(ta => {
        ta.style.height = 'auto';
        ta.style.height = Math.max(44, ta.scrollHeight) + 'px';
      });
    } catch(e) {
      try { localStorage.removeItem('gratitude_draft'); } catch(e2) {}
    }
  }

  /* ── Planted snapshot (prevents re-planting unchanged entries) ── */
  function savePlanted(snapshot) {
    try {
      localStorage.setItem('gratitude_planted', JSON.stringify({
        date: new Date().toDateString(), fieldValues: snapshot
      }));
    } catch(e) {}
  }

  function getLastPlanted() {
    try {
      const raw = localStorage.getItem('gratitude_planted');
      if (!raw) return {};
      const data = JSON.parse(raw);
      return data.date === new Date().toDateString() ? (data.fieldValues || {}) : {};
    } catch(e) { return {}; }
  }

  // Populate garden and archive from saved entries
  populateGardenFromHistory();
  renderArchive();

  // Defer slightly so we run after any browser form-state restoration
  setTimeout(restoreDraft, 50);
  // Also save right before the tab closes
  window.addEventListener('beforeunload', saveDraft);

  /* ── Day / night mode ── */
  (function() {
    const hour = new Date().getHours();
    // Night: 8pm (20) through 4:59am (< 5)
    document.body.classList.toggle('night-mode', hour >= 20 || hour < 5);
  })();

  /* ── Auto-expand textareas ── */
  document.querySelectorAll('.field-input, .reflection-input').forEach(ta => {
    const resize = () => {
      ta.style.height = 'auto';
      ta.style.height = Math.max(44, ta.scrollHeight) + 'px';
    };
    ta.addEventListener('input', resize);
    ta.addEventListener('input', saveDraft);
    resize();
  });

</script>
</body>
</html>
